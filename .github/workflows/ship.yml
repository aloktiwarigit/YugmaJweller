name: ship
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

permissions:
  contents: read
  id-token: write

env:
  PNPM_VERSION: "9.12.0"
  NODE_VERSION: "20.11.0"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit -- --coverage

  integration:
    needs: install
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Install Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project goldsmith-test &
          sleep 8
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
      - run: pnpm test:integration
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
          REDIS_URL: redis://localhost:6379

  tenant-isolation:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Install Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project goldsmith-test &
          sleep 8
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
      - run: pnpm test:tenant-isolation
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test

  semgrep:
    needs: install
    runs-on: ubuntu-latest
    container: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      # --severity ERROR: only block on ERROR-severity rules (WARNING findings are advisory).
      # theme-tokens and als-boundary-preserved are WARNING; dedicated codemod PR will address them.
      - run: semgrep --config ops/semgrep/ --error --severity ERROR .

  # Codex review is a LOCAL pre-push gate per CLAUDE.md, not a CI job.
  # Run `codex review --diff HEAD~1` (or the `codex-review-gate` Claude Code plugin)
  # before opening / merging a PR. CI handles the objective gates only.

  build-shopkeeper:
    # Validates Expo config + plugin resolution without running the full web
    # export. Real mobile builds happen via EAS post-anchor-SOW (same deferral
    # pattern as e2e-shopkeeper). Web export is not a shipped surface; gating
    # PR on it would require resolving metro+pnpm monorepo hoisting quirks
    # that aren't blocking the actual mobile build path.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Validate Expo config + plugin resolution
        working-directory: apps/shopkeeper
        run: pnpm exec expo config --type public > /dev/null
      - name: Build upstream deps then typecheck shopkeeper
        # turbo cascades ^build so @goldsmith/shared, @goldsmith/i18n etc. are compiled first.
        run: pnpm exec turbo run typecheck --filter=@goldsmith/shopkeeper

  build-customer-mobile:
    # Lightweight production-readiness gate for the customer EAS profile.
    # This does not create a store build; it verifies that APP_ENV=production
    # resolves to non-dev identifiers, HTTPS API config, and non-dev Firebase
    # app config file paths before EAS is allowed to build.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Validate customer-mobile production Expo config
        working-directory: apps/customer-mobile
        run: |
          pnpm --silent exec expo config --type public --json > /tmp/customer-mobile-expo-config.json
          node <<'NODE'
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('/tmp/customer-mobile-expo-config.json', 'utf8'));
          const errors = [];
          const androidPackage = config.android?.package ?? '';
          const iosBundleId = config.ios?.bundleIdentifier ?? '';
          const apiBaseUrl = config.extra?.apiBaseUrl ?? '';
          const androidGoogleServices = config.android?.googleServicesFile ?? '';
          const iosGoogleServices = config.ios?.googleServicesFile ?? '';

          if (!androidPackage || androidPackage.endsWith('.dev')) errors.push('android.package must be production and not end with .dev');
          if (!iosBundleId || iosBundleId.endsWith('.dev')) errors.push('ios.bundleIdentifier must be production and not end with .dev');
          if (!apiBaseUrl.startsWith('https://')) errors.push('extra.apiBaseUrl must be an HTTPS URL');
          if (!config.extra?.tenantSlug) errors.push('extra.tenantSlug is required');
          if (!config.extra?.firebaseProjectId) errors.push('extra.firebaseProjectId is required');
          if (config.extra?.devAuth) errors.push('extra.devAuth must be false in production');
          if (!androidGoogleServices || androidGoogleServices.includes('.dev')) errors.push('android.googleServicesFile must come from a production EAS secret path');
          if (!iosGoogleServices || iosGoogleServices.includes('.dev')) errors.push('ios.googleServicesFile must come from a production EAS secret path');

          if (errors.length > 0) {
            console.error(errors.map((error) => `- ${error}`).join('\n'));
            process.exit(1);
          }
          NODE
        env:
          APP_ENV: production
          EXPO_PUBLIC_API_BASE_URL: https://example.com
          EXPO_PUBLIC_SHOP_SLUG: ci-customer
          EXPO_PUBLIC_ANDROID_PACKAGE: com.goldsmith.customer.ci
          EXPO_PUBLIC_IOS_BUNDLE_ID: com.goldsmith.customer.ci
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: goldsmith-ci
          EXPO_PUBLIC_EAS_PROJECT_ID: 00000000-0000-0000-0000-000000000000
          GOOGLE_SERVICES_JSON: ./google-services.ci.json
          GOOGLE_SERVICES_PLIST: ./GoogleService-Info.ci.plist

  a11y-shopkeeper:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter=@goldsmith/shopkeeper

  e2e-shopkeeper:
    # Lightweight gate until EAS Dev Client APK exists (post-anchor-SOW).
    # Validates Maestro YAML is syntactically valid + the CLI installs cleanly.
    # Does NOT boot an Android emulator — that was ~10 min of wall time for
    # zero test signal since `maestro test` can't run without an installed APK.
    # When EAS ships, restore the full macOS + reactivecircus/android-emulator-runner@v2
    # flow from git history (commit fc3f138 has the original).
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Maestro CLI
        run: |
          curl -Ls get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Validate Maestro CLI + flow YAML
        run: |
          maestro --version
          # Maestro lacks a standalone `validate` for flow files, but `test --dry-run`
          # on a non-existent appId would fail regardless. A schema-level check is
          # sufficient for pre-EAS scaffolding — YAML parse + Maestro install.
          for f in \
            apps/shopkeeper/e2e/auth-flow.yaml \
            apps/shopkeeper/e2e/inventory-flow.yaml \
            apps/shopkeeper/e2e/invoice-flow.yaml \
            apps/shopkeeper/e2e/customer-lookup-flow.yaml \
            apps/customer-mobile/e2e/browse-flow.yaml ; do
            test -f "$f" || { echo "missing $f"; exit 1; }
            head -1 "$f" | grep -q '^appId:' || { echo "$f missing appId on line 1"; exit 1; }
            echo "OK $f"
          done

  lighthouse-ci:
    # Real Lighthouse CI run against the customer-web Next.js app — boots
    # Next.js on port 3000 via lighthouserc.cjs's startServerCommand, then
    # asserts performance (warn 0.8) + accessibility (error 0.9) categories.
    # Lighthouse uses axe-core internally for the accessibility category.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Build customer-web
        run: pnpm exec turbo run build --filter=@goldsmith/customer-web
        env:
          # CI validates production env shape; API calls 404 against example.com.
          API_URL: https://example.com
          NEXT_PUBLIC_API_BASE: https://example.com
          NEXT_PUBLIC_SITE_URL: https://customer-web.ci.goldsmith.example
          NEXT_PUBLIC_SHOP_SLUG: ci-lighthouse-test
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-public-firebase-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: goldsmith-ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: goldsmith-ci
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
      - name: Run Lighthouse CI (performance + axe-core a11y)
        working-directory: apps/customer-web
        run: pnpm lhci autorun
        env:
          API_URL: https://example.com
          NEXT_PUBLIC_API_BASE: https://example.com
          NEXT_PUBLIC_SITE_URL: https://customer-web.ci.goldsmith.example
          NEXT_PUBLIC_SHOP_SLUG: ci-lighthouse-test
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-public-firebase-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: goldsmith-ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: goldsmith-ci
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  build-customer-web:
    # Production build of customer-web with Sentry source-map upload.
    # SENTRY_AUTH_TOKEN is required — the build fails loudly if absent (per next.config.mjs guard).
    # Run only on push to main (not on PRs) to avoid burning Sentry quota on every PR.
    # On PRs, typecheck + lighthouse-ci cover correctness; source-map upload is a deploy concern.
    needs: [typecheck, lint, unit, lighthouse-ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Validate SENTRY_AUTH_TOKEN is present
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "ERROR: SENTRY_AUTH_TOKEN required for source-map upload" >&2
            echo "Add SENTRY_AUTH_TOKEN to GitHub repository secrets." >&2
            exit 1
          fi
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Build customer-web (with Sentry source-map upload)
        run: pnpm exec turbo run build --filter=@goldsmith/customer-web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SHOP_SLUG: ${{ secrets.NEXT_PUBLIC_SHOP_SLUG || 'anchor-dev' }}
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE || 'https://api.example.com' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  docs-validate:
    name: docs-validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validate agent-context layer
        run: pnpm docs:validate

  build-customer-mobile:
    # Story 19.2: validates Expo config + Sentry env vars are present.
    # Real EAS mobile builds happen via EAS post-anchor-SOW (Story 19.4).
    # This job ensures the Sentry integration is configured before merging.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Validate Sentry env vars are present
        # Fail fast with a clear message if secrets are not configured.
        # SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT must all be set for
        # source-map upload to work in EAS builds. EXPO_PUBLIC_SENTRY_DSN must
        # be set for events to be transmitted at runtime.
        # In PR runs the secrets may not be available — the check uses
        # SENTRY_REQUIRED=true to opt in (set on main-branch deploys only).
        run: |
          if [ "${SENTRY_REQUIRED:-false}" = "true" ]; then
            : "${SENTRY_AUTH_TOKEN:?SENTRY_AUTH_TOKEN required for source-map upload}"
            : "${SENTRY_ORG:?SENTRY_ORG required for source-map upload}"
            : "${SENTRY_PROJECT:?SENTRY_PROJECT required for source-map upload}"
            : "${EXPO_PUBLIC_SENTRY_DSN:?EXPO_PUBLIC_SENTRY_DSN required for Sentry event transmission}"
            echo "All Sentry env vars present."
          else
            echo "SENTRY_REQUIRED not set — skipping secret presence check (PR build)."
          fi
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      - name: Validate Expo config + plugin resolution
        working-directory: apps/customer-mobile
        run: pnpm exec expo config --type public > /dev/null
      - name: Typecheck customer-mobile
        run: pnpm exec turbo run typecheck --filter=@goldsmith/customer-mobile

  build:
    needs: [typecheck, lint, unit, integration, tenant-isolation, semgrep, build-shopkeeper, build-customer-mobile, a11y-shopkeeper, e2e-shopkeeper, lighthouse-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          API_URL: https://example.com
          NEXT_PUBLIC_API_BASE: https://example.com
          NEXT_PUBLIC_SITE_URL: https://customer-web.ci.goldsmith.example
          NEXT_PUBLIC_SHOP_SLUG: ci-lighthouse-test
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-public-firebase-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: goldsmith-ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: goldsmith-ci
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"

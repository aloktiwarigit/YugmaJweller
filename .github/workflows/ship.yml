name: ship
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

permissions:
  contents: read
  id-token: write

env:
  PNPM_VERSION: "9.12.0"
  NODE_VERSION: "20.11.0"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit -- --coverage

  integration:
    needs: install
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Install Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project goldsmith-test &
          sleep 8
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
      - run: pnpm test:integration
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
          REDIS_URL: redis://localhost:6379

  tenant-isolation:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Install Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project goldsmith-test &
          sleep 8
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
      - run: pnpm test:tenant-isolation
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test

  semgrep:
    needs: install
    runs-on: ubuntu-latest
    container: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      # --severity ERROR: only block on ERROR-severity rules (WARNING findings are advisory).
      # theme-tokens and als-boundary-preserved are WARNING; dedicated codemod PR will address them.
      - run: semgrep --config ops/semgrep/ --error --severity ERROR .

  # Codex review is a LOCAL pre-push gate per CLAUDE.md, not a CI job.
  # Run `codex review --diff HEAD~1` (or the `codex-review-gate` Claude Code plugin)
  # before opening / merging a PR. CI handles the objective gates only.

  build-customer-mobile:
    # Validates customer-mobile Expo config + production build guards.
    # Real EAS builds happen outside CI (post-tenant-SOW); this job only
    # validates that the config is syntactically valid and that the production
    # guard logic (HTTPS URL, no .dev bundle IDs) is wired correctly.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Validate Expo config (dev profile — guards bypass for dev)
        working-directory: apps/customer-mobile
        env:
          EXPO_PUBLIC_DEV_AUTH: "1"
          EXPO_PUBLIC_API_BASE_URL: "http://10.0.2.2:3001"
          EXPO_PUBLIC_SHOP_SLUG: "anchor-dev"
          EXPO_PUBLIC_APP_NAME: "Goldsmith Dev"
          EXPO_PUBLIC_ANDROID_PACKAGE: "com.goldsmith.customer.dev"
          EXPO_PUBLIC_IOS_BUNDLE_ID: "com.goldsmith.customer.dev"
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: "goldsmith-dev"
        run: pnpm exec expo config --type public > /dev/null
      - name: Assert production guards (vitest build-validation suite)
        # Runs the unit tests in test/build-validation.test.ts which verify:
        #   - http:// URL is rejected in production builds
        #   - .dev bundle IDs are rejected in production builds
        #   - dev builds (EXPO_PUBLIC_DEV_AUTH=1) bypass both guards
        # This catches regressions in src/build-validation.ts before a bad
        # build reaches the store.
        working-directory: apps/customer-mobile
        run: pnpm exec vitest run test/build-validation.test.ts
      - name: Typecheck customer-mobile
        run: pnpm exec turbo run typecheck --filter=@goldsmith/customer-mobile

  build-shopkeeper:
    # Validates Expo config + plugin resolution without running the full web
    # export. Real mobile builds happen via EAS post-anchor-SOW (same deferral
    # pattern as e2e-shopkeeper). Web export is not a shipped surface; gating
    # PR on it would require resolving metro+pnpm monorepo hoisting quirks
    # that aren't blocking the actual mobile build path.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Validate Expo config + plugin resolution
        working-directory: apps/shopkeeper
        run: pnpm exec expo config --type public > /dev/null
      - name: Build upstream deps then typecheck shopkeeper
        # turbo cascades ^build so @goldsmith/shared, @goldsmith/i18n etc. are compiled first.
        run: pnpm exec turbo run typecheck --filter=@goldsmith/shopkeeper

  a11y-shopkeeper:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter=@goldsmith/shopkeeper

  e2e-shopkeeper:
    # Lightweight gate until EAS Dev Client APK exists (post-anchor-SOW).
    # Validates Maestro YAML is syntactically valid + the CLI installs cleanly.
    # Does NOT boot an Android emulator — that was ~10 min of wall time for
    # zero test signal since `maestro test` can't run without an installed APK.
    # When EAS ships, restore the full macOS + reactivecircus/android-emulator-runner@v2
    # flow from git history (commit fc3f138 has the original).
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Maestro CLI
        run: |
          curl -Ls get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Validate Maestro CLI + flow YAML
        run: |
          maestro --version
          # Maestro lacks a standalone `validate` for flow files, but `test --dry-run`
          # on a non-existent appId would fail regardless. A schema-level check is
          # sufficient for pre-EAS scaffolding — YAML parse + Maestro install.
          for f in \
            apps/shopkeeper/e2e/auth-flow.yaml \
            apps/shopkeeper/e2e/inventory-flow.yaml \
            apps/shopkeeper/e2e/invoice-flow.yaml \
            apps/shopkeeper/e2e/customer-lookup-flow.yaml \
            apps/customer-mobile/e2e/browse-flow.yaml ; do
            test -f "$f" || { echo "missing $f"; exit 1; }
            head -1 "$f" | grep -q '^appId:' || { echo "$f missing appId on line 1"; exit 1; }
            echo "OK $f"
          done

  lighthouse-ci:
    # Real Lighthouse CI run against the customer-web Next.js app — boots
    # Next.js on port 3000 via lighthouserc.cjs's startServerCommand, then
    # asserts performance (warn 0.8) + accessibility (error 0.9) categories.
    # Lighthouse uses axe-core internally for the accessibility category.
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Build customer-web
        run: pnpm exec turbo run build --filter=@goldsmith/customer-web
        env:
          # CI slug — API will 404, pages render graceful fallback state
          NEXT_PUBLIC_SHOP_SLUG: ci-lighthouse-test
      - name: Run Lighthouse CI (performance + axe-core a11y)
        working-directory: apps/customer-web
        run: pnpm lhci autorun
        env:
          NEXT_PUBLIC_SHOP_SLUG: ci-lighthouse-test
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  docs-validate:
    name: docs-validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validate agent-context layer
        run: pnpm docs:validate

  build:
    needs: [typecheck, lint, unit, integration, tenant-isolation, semgrep, build-customer-mobile, build-shopkeeper, a11y-shopkeeper, e2e-shopkeeper, lighthouse-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

name: ship
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

permissions:
  contents: read
  id-token: write

env:
  PNPM_VERSION: "9.12.0"
  NODE_VERSION: "20.11.0"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit -- --coverage

  integration:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Install Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project goldsmith-test &
          sleep 8
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
      - run: pnpm test:integration
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test

  tenant-isolation:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Install Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project goldsmith-test &
          sleep 8
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test
      - run: pnpm test:tenant-isolation
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIREBASE_PROJECT_ID: goldsmith-test

  semgrep:
    needs: install
    runs-on: ubuntu-latest
    container: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep --config ops/semgrep/ --error .

  # Codex review is a LOCAL pre-push gate per CLAUDE.md, not a CI job.
  # Run `codex review --diff HEAD~1` (or the `codex-review-gate` Claude Code plugin)
  # before opening / merging a PR. CI handles the objective gates only.

  build:
    needs: [typecheck, lint, unit, integration, tenant-isolation, semgrep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

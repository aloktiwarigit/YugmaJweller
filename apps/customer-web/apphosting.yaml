# Firebase App Hosting template for customer-web (Next.js SSR).
#
# This template is intentionally not deployable as-is. Replace every
# REPLACE_WITH_* value for the target tenant/backend before connecting a
# production App Hosting backend. The repository does not currently contain a
# release promotion record proving any production backend is live.
#
# Required production values:
#   NEXT_PUBLIC_SHOP_SLUG             lowercase tenant slug
#   API_URL                           HTTPS server-to-server API origin
#   NEXT_PUBLIC_API_BASE              HTTPS browser API origin
#   NEXT_PUBLIC_SITE_URL              HTTPS customer storefront origin
#   NEXT_PUBLIC_FIREBASE_*            Firebase Web SDK public config

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"

  - variable: NEXT_PUBLIC_SHOP_SLUG
    value: REPLACE_WITH_TENANT_SLUG

  - variable: API_URL
    value: REPLACE_WITH_HTTPS_API_URL
  - variable: NEXT_PUBLIC_API_BASE
    value: REPLACE_WITH_HTTPS_API_BASE
  - variable: NEXT_PUBLIC_SITE_URL
    value: REPLACE_WITH_HTTPS_SITE_URL

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: REPLACE_WITH_FIREBASE_WEB_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: REPLACE_WITH_FIREBASE_AUTH_DOMAIN
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: REPLACE_WITH_FIREBASE_PROJECT_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: REPLACE_WITH_FIREBASE_WEB_APP_ID

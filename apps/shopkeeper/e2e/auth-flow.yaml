appId: com.goldsmith.shopkeeper.dev
name: "Shopkeeper auth — OTP golden path"
tags:
  - golden-path
  - auth
---
# Verifies the demo-ready login flow: brand name visible, Hindi-first copy,
# OTP entry, post-login dashboard, white-label invariant (no Goldsmith
# platform brand leaked to shopkeeper-facing surfaces).
- launchApp:
    clearState: true
- assertVisible: "अयोध्या स्वर्णकार"
- assertVisible: "अपना फ़ोन नंबर डालें"
- tapOn:
    id: "phone-input"
- inputText: "9876543210"
- tapOn: "आगे बढ़ें"
- assertVisible: "OTP डालें"
- inputText: "123456"
- tapOn: "सत्यापित करें"
- assertVisible: "आइए, अपना shop set up करें"
- assertVisible: "Staff जोड़ें"
# White-label invariant — these strings must NEVER leak to shopkeeper UI.
- assertNotVisible: "Goldsmith"
- assertNotVisible: "Powered by"

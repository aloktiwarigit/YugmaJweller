# Cloud Build config for the Goldsmith NestJS API.
# Local submit:
#   gcloud builds submit --config cloudbuild.yaml --ignore-file=.gcloudignore-api \
#     --project goldsmith-dev .
#
# All resources are in asia-south1 (Mumbai). The previous asia-east1 stack was
# decommissioned 2026-05-17.

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-api
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --file=apps/api/Dockerfile
      - --tag=asia-south1-docker.pkg.dev/goldsmith-dev/goldsmith-api/api:$BUILD_ID
      - --tag=asia-south1-docker.pkg.dev/goldsmith-dev/goldsmith-api/api:latest
      - --cache-from=asia-south1-docker.pkg.dev/goldsmith-dev/goldsmith-api/api:latest
      - .

images:
  - asia-south1-docker.pkg.dev/goldsmith-dev/goldsmith-api/api:$BUILD_ID
  - asia-south1-docker.pkg.dev/goldsmith-dev/goldsmith-api/api:latest

options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 50
  logging: CLOUD_LOGGING_ONLY

rules:
  - id: goldsmith.billing-must-not-import-applyGstSplit-directly
    message: |
      apps/api/src/modules/billing/billing.service.ts must not import
      applyGstSplit directly from @goldsmith/compliance. Route pricing
      through computeProductPrice (from @goldsmith/money), which calls
      applyGstSplit internally, so invoice line totals and product-catalogue
      prices always agree and the GST split cannot diverge.
    severity: ERROR
    languages: [typescript]
    paths:
      include:
        - "**/apps/api/src/modules/billing/billing.service.ts"
    pattern-either:
      - pattern: import { applyGstSplit } from '@goldsmith/compliance'
      - pattern: import { applyGstSplit, ... } from '@goldsmith/compliance'
      - pattern: import { ..., applyGstSplit } from '@goldsmith/compliance'
      - pattern: import { ..., applyGstSplit, ... } from '@goldsmith/compliance'

rules:
  - id: goldsmith.no-raw-bullmq-import
    languages: [typescript]
    severity: ERROR
    message: |
      Direct import of bullmq is forbidden outside packages/queue. Use TenantQueue +
      createTenantWorker so tenant metadata is always present (threat-model S1-M7).
    patterns:
      - pattern-either:
          - pattern: import { Queue } from 'bullmq'
          - pattern: import { Worker } from 'bullmq'
          - pattern: import { QueueEvents } from 'bullmq'
          - pattern: require('bullmq')
      # `import type` is erased at compile time — pure TypeScript annotation,
      # no runtime Queue instantiation. The rule targets RUNTIME use only.
      - pattern-not: import type { Queue } from 'bullmq'
      - pattern-not: import type { Worker } from 'bullmq'
      - pattern-not: import type { QueueEvents } from 'bullmq'
    paths:
      exclude:
        - "packages/queue/**"

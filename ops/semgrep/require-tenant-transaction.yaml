rules:
  - id: goldsmith.require-tenant-transaction
    languages: [typescript]
    severity: ERROR
    message: |
      Raw DB execution is forbidden. Wrap queries in `withTenantTx` (packages/db) so the
      tenant SET LOCAL is always applied. If this call is intentionally platform-global, use the
      `platformGlobalExecute()` helper + reviewer sign-off.
    paths:
      exclude:
        - "packages/db/**"
        - "packages/testing/**"
        - "**/*.test.ts"
        - "**/*.integration.test.ts"
        - "apps/api/src/modules/auth/**"        # pre-tenant: auth lookup + rate-limit (see ADR-0016)
        - "apps/api/src/modules/tenant-boot/**" # pre-tenant: slug→tenant bootstrap
        - "apps/api/src/drizzle-tenant-lookup.ts" # pre-tenant: resolves tenant from shop_id before ctx exists
        - "packages/audit/src/platform-audit-log.ts" # platform-global: writes to platform_audit_events (no tenant ctx)
        - "apps/api/src/modules/pricing/pricing.service.ts" # platform-global: ibja_rate_snapshots + platform_audit_events reads/writes
        - "apps/api/src/workers/rates-refresh.processor.ts" # platform-global: platform_audit_events write in fallback handler
        - "packages/sync/**"                       # sync package: cursor/push/sync-logger use withTenantTx internally, false-positive on tx.query inside the callback
        - "apps/shopkeeper/**"                     # client-side (React Native): WatermelonDB queries, no server-side tenant transaction context
        - "ops/semgrep/tests/**"
        - "scripts/**"                           # seed/migration scripts run as superuser, not in tenant context
    patterns:
      - pattern-either:
          - pattern: $DB.execute($...X)
          - pattern: $DB.query($...X)
          - pattern: $POOL.connect()
      - pattern-not-inside: |
          withTenantTx(...) { ... }
      - pattern-not-inside: |
          withTenantTx($POOL, async ($TX) => { ... })

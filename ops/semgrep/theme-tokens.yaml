rules:
  - id: goldsmith.theme-tokens
    languages: [typescript]
    severity: WARNING
    message: >
      Hex color literals are forbidden outside packages/ui-tokens — all colors
      must flow through @goldsmith/ui-tokens (spec §13 invariant 23).
      Severity temporarily WARNING; dedicated codemod PR will restore ERROR once all 30 files are fixed.
    patterns:
      - pattern-regex: '#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})\b'
    paths:
      include:
        - "apps/shopkeeper/**"
        - "packages/ui-mobile/**"
      exclude:
        - "packages/ui-tokens/**"
        - "**/*.test.*"
        - "**/e2e/**"
        - "**/node_modules/**"
